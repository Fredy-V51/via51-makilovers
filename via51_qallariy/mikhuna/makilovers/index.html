<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola Mundo Pro</title>
    <style>
        /* Estilos para que se vea moderno */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #0f172a;
            /* Fondo oscuro elegante */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        h1 {
            font-size: 5rem;
            font-weight: 800;
            text-align: center;
            /* Degradado animado en el texto */
            background: linear-gradient(90deg, #38bdf8, #818cf8, #c084fc, #38bdf8);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-animation 3s linear infinite;
            filter: drop-shadow(0 0 10px rgba(129, 140, 248, 0.3));
        }

        @keyframes gradient-animation {
            to {
                background-position: 200% center;
            }
        }

        /* Pequeño detalle decorativo */
        .subtext {
            position: absolute;
            bottom: 20px;
            color: #94a3b8;
            letter-spacing: 2px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <h1>Hola Mundo</h1>

    <div class="subtext">Renderizado vía Antigravity & GitHub</div>

</body>

</html>
